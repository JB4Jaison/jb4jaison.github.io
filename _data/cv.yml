cv:
  name: Jaison John
  label: Image Data Scientist & AI/ML Engineer
  email: john.jaison6299@gmail.com
  location: Memphis, TN
  image: ""
  summary: Image Data Scientist and AI/ML Engineer with expertise in computer vision, deep learning, and biomedical imaging. Experienced in building scalable pipelines, self-supervised learning, and deploying models in research and industry settings.

  social_networks:
    - network: LinkedIn
      username: jaijohn

  sections:
    Experience:
      - company: St. Jude Children's Research Hospital
        position: Image Data Scientist (Computer Vision Scientist)
        location: Memphis, TN
        start_date: 2023-03
        end_date: Present
        highlights:
          - Led advanced analysis of medical images across EM, Fluorescence, and Lightsheet microscopy modalities, resulting in authorship across three peer-reviewed publications.
          - Co-instructed bi-annual Bio Image Analysis courses for 40+ students per cohort at the institution.
          - Deployed Singularity-based multi-CPU/multi-GPU image processing pipelines on HPC for reproducible, scalable execution.
          - Architected a self-supervised clustering algorithm for cellular phenotype classification without labeled datasets using embeddings from models such as DINO.
          - Developed a deep learning super-resolution pipeline for microscopy achieving superior Z-axis reconstruction over bicubic interpolation across MSE, PSNR, and SSIM metrics.
          - Unified a multi-step linear radial intensity analysis workflow into a scalable, modular Snakemake pipeline with parallel execution, halving previous runtime.
          - Designed high-throughput annotation strategies combining expert review with AI-assisted labeling, accelerating annotation creation by up to 10×.
          - Established a fluorescent mouse retinal vasculature analysis workflow—covering pre-processing, segmentation, and feature extraction—across 1000+ 3D volumes with 92% accuracy.
          - Developed custom Napari Qt plugins to streamline scientist workflows and improve usability of internal image-processing tools.
          - Trained a UNet model for automated removal of drosophila embryo yolk from 3D volumes.
          - Built a PDF parser using multimodal LLMs (GPT-4o) and an LMM RAG database for biomedical imaging question answering.
          - Constructed a pipeline for enhancing large (300GB+) lightsheet microscopy images for visualization and improved segmentation.
          - Developed a hollow vasculature detection pipeline using Circle Hough Transform, reducing vessel quantification error rates by 50%.
        technologies: Python, Napari, Snakemake, ImageJ, Singularity, Ilastik, Cellpose, Imaris, QuPath

      - company: Cambridge Mobile Telematics
        position: Data Science (Deep Learning) Intern
        location: Boston, MA
        start_date: 2022-06
        end_date: 2022-09
        highlights:
          - Conceptualized and implemented an ML pipeline to automate crash labeling, reducing label turnover time by 80%.
          - Conducted literature surveys on weakly-supervised learning and developed a Vision Transformer architecture for the labeling process.
          - Explained model results using explainable AI techniques.
        technologies: Python, Databricks, Docker, PyTorch, PySpark

      - company: Fulcrum Therapeutics
        position: Machine Learning and Computational Biology Co-op
        location: Boston, MA
        start_date: 2021-07
        end_date: 2021-12
        highlights:
          - Created a DNA splicing analysis workflow using Python-based splicing toolkits, speeding up the existing pipeline by at least 50%.
          - Worked with AWS cloud services for storing, retrieving, and analyzing large datasets.
        technologies: Python, EC2, S3, rMATS

